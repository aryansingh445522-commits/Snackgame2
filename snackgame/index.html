<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Neon Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bungee&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #11111a;
    --border: #1e1e30;
    --neon-green: #39ff14;
    --neon-red: #ff2d55;
    --neon-blue: #00d4ff;
    --neon-yellow: #ffd700;
    --neon-purple: #bf5fff;
    --dim: #3a3a55;
    --text: #c8c8e0;
    --glow-green: 0 0 8px #39ff14, 0 0 20px #39ff1488;
    --glow-red: 0 0 8px #ff2d55, 0 0 20px #ff2d5588;
    --glow-blue: 0 0 8px #00d4ff, 0 0 20px #00d4ff88;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 40px);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-family: 'Bungee', sans-serif;
    font-size: 42px;
    letter-spacing: 6px;
    color: var(--neon-green);
    text-shadow: var(--glow-green);
    text-transform: uppercase;
  }

  .hud {
    display: flex;
    gap: 40px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--dim);
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .hud-label { font-size: 10px; color: #44445a; }
  .hud-value {
    font-size: 20px;
    color: var(--neon-blue);
    text-shadow: var(--glow-blue);
    min-width: 60px;
    text-align: center;
    transition: color 0.1s;
  }
  .hud-value.flash {
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
  }

  .arena-wrap {
    position: relative;
  }

  canvas {
    display: block;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px #39ff1422, inset 0 0 60px #000000aa;
    border-radius: 4px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #0a0a0fdd;
    border-radius: 4px;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-family: 'Bungee', sans-serif;
    font-size: 32px;
    color: var(--neon-red);
    text-shadow: var(--glow-red);
    letter-spacing: 4px;
  }

  .overlay-sub {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 3px;
    text-align: center;
    line-height: 2;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 10px 32px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: var(--glow-green);
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #39ff1415; }
  .btn:active { transform: scale(0.97); }

  .controls {
    display: flex;
    gap: 8px;
    flex-direction: column;
    align-items: center;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(2, 44px);
    gap: 4px;
  }

  .dpad-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .dpad-btn:active, .dpad-btn.pressed {
    background: #39ff1415;
    color: var(--neon-green);
    border-color: var(--neon-green);
  }

  .speed-row {
    display: flex;
    gap: 20px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #33334a;
  }

  .speed-opt {
    cursor: pointer;
    padding: 4px 10px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .speed-opt.active {
    color: var(--neon-purple);
    border-color: var(--neon-purple);
    text-shadow: 0 0 8px var(--neon-purple);
  }
</style>
</head>
<body>

<div class="wrapper">
  <h1>Snake</h1>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">BEST</span>
      <span class="hud-value" id="best">0</span>
    </div>
  </div>

  <div class="arena-wrap">
    <canvas id="c" width="400" height="400"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlay-title">Ready?</div>
      <div class="overlay-sub" id="overlay-sub">Use arrow keys or WASD<br>to control the snake</div>
      <button class="btn" id="start-btn">Start Game</button>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" id="btn-up" aria-label="Up">▲</button>
      <div></div>
      <button class="dpad-btn" id="btn-left" aria-label="Left">◀</button>
      <button class="dpad-btn" id="btn-down" aria-label="Down">▼</button>
      <button class="dpad-btn" id="btn-right" aria-label="Right">▶</button>
    </div>
    <div class="speed-row">
      <span class="speed-opt active" data-speed="200">SLOW</span>
      <span class="speed-opt" data-speed="120">NORMAL</span>
      <span class="speed-opt" data-speed="65">FAST</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const COLS = 20, ROWS = 20;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, bonus, score, level, best, running, loopId, frameInterval, lastFrame;
let pressedBtn = null;

const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const startBtn = document.getElementById('start-btn');

best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = best;

function init() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  bonus = null;
  scoreEl.textContent = 0;
  levelEl.textContent = 1;
  spawnFood();
}

function rnd(max) { return Math.floor(Math.random() * max); }

function freeCell() {
  let c;
  do { c = { x: rnd(COLS), y: rnd(ROWS) }; }
  while (snake.some(s => s.x === c.x && s.y === c.y) ||
         (food && food.x === c.x && food.y === c.y));
  return c;
}

function spawnFood() {
  food = { ...freeCell(), pulse: 0 };
  if (score > 0 && score % 50 === 0 && !bonus) spawnBonus();
}

let bonusTimer;
function spawnBonus() {
  clearTimeout(bonusTimer);
  bonus = { ...freeCell(), pulse: 0 };
  bonusTimer = setTimeout(() => { bonus = null; }, 6000);
}

function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    scoreEl.textContent = score;
    flashHud('score');
    if (score >= level * 100) { level++; levelEl.textContent = level; flashHud('level'); }
    spawnFood();
    if (score % 50 === 0) spawnBonus();
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 50 * level;
    scoreEl.textContent = score;
    flashHud('score');
    bonus = null;
    clearTimeout(bonusTimer);
  } else {
    snake.pop();
  }

  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snakeBest', best); }
}

function gameOver() {
  running = false;
  cancelAnimationFrame(loopId);
  drawDeathFlash(0);
  overlayTitle.textContent = 'Game Over';
  overlayTitle.style.color = 'var(--neon-red)';
  overlayTitle.style.textShadow = '0 0 8px #ff2d55, 0 0 20px #ff2d5588';
  overlaySub.innerHTML = `Score: <span style="color:var(--neon-blue)">${score}</span><br>Best: <span style="color:var(--neon-yellow)">${best}</span>`;
  startBtn.textContent = 'Play Again';
  overlay.classList.remove('hidden');
}

function drawDeathFlash(n) {
  if (n >= 4) { draw(); return; }
  ctx.fillStyle = n % 2 === 0 ? '#ff2d5530' : 'transparent';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  setTimeout(() => drawDeathFlash(n + 1), 80);
}

function flashHud(id) {
  const el = document.getElementById(id);
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 300);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#13132080';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const g = Math.round(255 * (1 - t * 0.55));
    const alpha = 1 - t * 0.15;
    ctx.fillStyle = i === 0 ? '#39ff14' : `rgba(20, ${g}, 20, ${alpha})`;
    if (i === 0) ctx.shadowColor = '#39ff14', ctx.shadowBlur = 12;
    else ctx.shadowBlur = 0;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 4 : 2);
    ctx.fill();
  });

  ctx.shadowBlur = 0;

  if (food) {
    food.pulse = (food.pulse || 0) + 0.08;
    const s = 1 + Math.sin(food.pulse) * 0.15;
    const cx2 = food.x * CELL + CELL / 2;
    const cy2 = food.y * CELL + CELL / 2;
    const r = (CELL / 2 - 3) * s;
    ctx.shadowColor = '#ff2d55';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff2d55';
    ctx.beginPath();
    ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (bonus) {
    bonus.pulse = (bonus.pulse || 0) + 0.12;
    const s = 1 + Math.sin(bonus.pulse) * 0.2;
    const bx = bonus.x * CELL + CELL / 2;
    const by = bonus.y * CELL + CELL / 2;
    const r2 = (CELL / 2 - 2) * s;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    drawStar(ctx, bx, by, 5, r2, r2 * 0.45);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawStar(ctx, cx, cy, pts, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI) / pts - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle))
            : ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  }
  ctx.closePath();
}

function loop(ts) {
  if (!running) return;
  loopId = requestAnimationFrame(loop);
  if (!lastFrame) lastFrame = ts;
  const elapsed = ts - lastFrame;
  const interval = 200 - (level - 1) * 12;
  if (elapsed >= Math.max(interval, 70)) {
    lastFrame = ts;
    step();
  }
  draw();
}

function startGame() {
  overlay.classList.add('hidden');
  init();
  running = true;
  lastFrame = null;
  loopId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);

const dirMap = {
  ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 },
  ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
  ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 },
};

document.addEventListener('keydown', e => {
  const d = dirMap[e.key] || dirMap[e.key.toLowerCase()];
  if (!d) return;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (!running) return;
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
});

function dpadPress(key) {
  const d = dirMap[key];
  if (!d || !running) return;
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
}

document.getElementById('btn-up').addEventListener('click', () => dpadPress('ArrowUp'));
document.getElementById('btn-down').addEventListener('click', () => dpadPress('ArrowDown'));
document.getElementById('btn-left').addEventListener('click', () => dpadPress('ArrowLeft'));
document.getElementById('btn-right').addEventListener('click', () => dpadPress('ArrowRight'));

document.querySelectorAll('.speed-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.speed-opt').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  });
});

draw();
</script>
</body>
</html>
